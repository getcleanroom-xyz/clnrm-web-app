<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Terminal window chrome / accent -->
  <rect x="30" y="30" width="840" height="180" rx="8" stroke="#00FF41" stroke-width="0.8" stroke-opacity="0.15" fill="none"/>
  <rect x="30" y="30" width="840" height="30" rx="8" fill="#00FF41" fill-opacity="0.04"/>

  <!-- Terminal dots -->
  <circle cx="52" cy="45" r="4.5" fill="#00FF41" fill-opacity="0.25"/>
  <circle cx="70" cy="45" r="4.5" fill="#00FF41" fill-opacity="0.15"/>
  <circle cx="88" cy="45" r="4.5" fill="#00FF41" fill-opacity="0.1"/>

  <!-- Top-right "close" marker -->
  <text x="835" y="52" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00FF41" fill-opacity="0.15">clnrm</text>

  <!-- Prompt arrow -->
  <text x="55" y="155" font-family="'JetBrains Mono', monospace" font-size="40" fill="#00FF41" fill-opacity="0.35" font-weight="500">&gt;</text>

  <!-- "Clean" — lighter, like a typed command -->
  <g filter="url(#glow-soft)">
    <text x="100" y="155" font-family="'Geist', sans-serif" font-size="68" fill="#00FF41" fill-opacity="0.85" font-weight="350" letter-spacing="1">Clean</text>
  </g>

  <!-- "Room" — bolder, like the output/env name -->
  <g filter="url(#glow)">
    <text x="410" y="155" font-family="'Geist', sans-serif" font-size="72" fill="#00FF41" font-weight="650" letter-spacing="-0.5">Room</text>
  </g>

  <!-- Accent gap — subtle underscore connecting the two words -->
  <line x1="100" y1="178" x2="370" y2="178" stroke="#00FF41" stroke-width="1.2" stroke-opacity="0.2"/>
  <line x1="410" y1="178" x2="770" y2="178" stroke="#00FF41" stroke-width="2" stroke-opacity="0.5" filter="url(#glow-soft)"/>

  <!-- Cursor block -->
  <rect x="785" y="110" width="20" height="36" rx="2" fill="#00FF41" fill-opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.05;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanning line overlay (subtle CRT effect) -->
  <rect x="30" y="30" width="840" height="180" rx="8" fill="none">
    <animate attributeName="y" values="30;185;30" dur="8s" repeatCount="indefinite"/>
  </rect>
  <rect x="36" y="30" width="828" height="2" rx="1" fill="#00FF41" fill-opacity="0.04">
    <animate attributeName="y" values="35;200;35" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle footer label -->
  <text x="55" y="202" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00FF41" fill-opacity="0.12">virtual disposable android phones</text>
</svg>
