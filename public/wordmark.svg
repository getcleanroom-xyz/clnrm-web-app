<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="particle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g stroke="#00FF41" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Prompt caret — intact -->
    <path d="M 22 50 L 40 68 L 22 86"/>
    <circle cx="40" cy="68" r="3.5" fill="#00FF41" stroke="none"/>

    <!-- C — intact -->
    <path d="M 95 30 C 60 30 50 50 50 70 C 50 90 60 110 95 110"/>
    <line x1="93" y1="30" x2="98" y2="30" stroke-width="6"/>
    <line x1="93" y1="110" x2="98" y2="110" stroke-width="6"/>
    <circle cx="98" cy="30" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="98" cy="110" r="4" fill="#00FF41" stroke="none"/>

    <!-- L — intact -->
    <path d="M 155 18 L 155 118 L 210 118"/>
    <circle cx="155" cy="18" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="155" cy="117" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="210" cy="118" r="4" fill="#00FF41" stroke="none"/>

    <!-- N — first particle drift appears -->
    <path d="M 250 18 L 250 118 L 310 18 L 310 118"/>
    <circle cx="250" cy="18" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="250" cy="118" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="310" cy="18" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="310" cy="117" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="295" cy="52" r="2.5" fill="#00FF41" stroke="none"/>

    <!-- R — bowl has a small gap, leg is fragmenting -->
    <path d="M 360 118 L 360 18 C 396 18 405 38 408 55"/>
    <path d="M 370 75 C 385 88 380 100 360 95"/>
    <path d="M 385 100 L 396 118" opacity="0.65"/>
    <circle cx="360" cy="18" r="4" fill="#00FF41" stroke="none"/>
    <circle cx="360" cy="117" r="4" fill="#00FF41" stroke="none"/>

    <!-- M — actively dissolving, partial paths + debris trail -->
    <path d="M 460 18 L 460 118" opacity="0.9"/>
    <path d="M 525 118 L 525 32" opacity="0.55"/>
    <path d="M 460 118 L 490 68" opacity="0.75"/>
    <path d="M 490 68 L 518 100" opacity="0.4"/>
    <circle cx="460" cy="18" r="3.5" fill="#00FF41" stroke="none" opacity="0.85"/>
    <circle cx="460" cy="118" r="3.5" fill="#00FF41" stroke="none" opacity="0.85"/>
    <circle cx="525" cy="32" r="2.5" fill="#00FF41" stroke="none" opacity="0.5"/>

  </g>

  <!-- Particle trail — dispersing upwards and rightwards -->
  <g fill="#00FF41" filter="url(#particle-glow)">

    <!-- Near R -->
    <circle cx="405" cy="30" r="2" opacity="0.7"/>
    <circle cx="412" cy="45" r="1.2" opacity="0.5"/>
    <circle cx="398" cy="22" r="1.5" opacity="0.3"/>

    <!-- Dissolving M particles -->
    <circle cx="540" cy="25" r="2.5" opacity="0.8"/>
    <circle cx="548" cy="40" r="1.8" opacity="0.6"/>
    <circle cx="555" cy="18" r="1.2" opacity="0.35"/>
    <circle cx="545" cy="55" r="2" opacity="0.55"/>
    <circle cx="560" cy="35" r="1.5" opacity="0.4"/>
    <circle cx="535" cy="60" r="1" opacity="0.25"/>
    <circle cx="552" cy="48" r="0.8" opacity="0.2"/>

    <!-- Escaped / far drift -->
    <circle cx="568" cy="15" r="1.8" opacity="0.5"/>
    <circle cx="575" cy="28" r="1" opacity="0.3"/>
    <circle cx="580" cy="42" r="0.7" opacity="0.15"/>
    <circle cx="572" cy="50" r="1.3" opacity="0.25"/>
    <circle cx="562" cy="62" r="0.6" opacity="0.1"/>
  </g>

  <!-- Cursor — blinking, positioned where M used to end -->
  <rect x="556" y="22" width="10" height="96" rx="2" fill="#00FF41" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.05;0.85" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
